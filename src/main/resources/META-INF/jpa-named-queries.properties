# ============================================================================
# PlaneswalkerBazar — Named queries JPQL
# Convenzione Spring Data: NomeEntity.nomeMetodo = query
# Le derived query semplici (findByUtenteId, findByProdottoIdAndAttivoTrue...)
# NON vanno qui: le genera Spring Data dal nome del metodo.
# NB: il lock NON si dichiara qui — sta nell'annotazione @Lock sul metodo
# del repository; qui vive solo la JPQL. Stesso principio per @Modifying
# (le UPDATE dei refresh token): l'annotazione sta sul metodo.
# ============================================================================

# --- Portafoglio: caricamento per modifica saldo (con @Lock PESSIMISTIC_WRITE) ---
Portafoglio.findByUtenteIdForUpdate=SELECT p FROM Portafoglio p WHERE p.utente.id = :utenteId

# --- MagazzinoSKU: lock di checkout, ORDER BY = ordine di acquisizione anti-deadlock ---
MagazzinoSKU.findByIdInForUpdate=SELECT s FROM MagazzinoSKU s WHERE s.id IN :ids ORDER BY s.id

# --- MagazzinoSKU: dettaglio con grafo completo (anti-N+1) ---
MagazzinoSKU.findByIdWithProdotto=SELECT s FROM MagazzinoSKU s \
  JOIN FETCH s.prodotto p \
  LEFT JOIN FETCH p.stampa st \
  LEFT JOIN FETCH p.espansione e \
  WHERE s.id = :id AND s.attivo = TRUE

# --- Prodotto: dettaglio per slug con grafo completo ---
Prodotto.findBySlugWithDettagli=SELECT p FROM Prodotto p \
  LEFT JOIN FETCH p.stampa st \
  LEFT JOIN FETCH st.carta c \
  LEFT JOIN FETCH p.espansione e \
  WHERE p.slug = :slug AND p.attivo = TRUE

# --- Prodotto: ricerca per nome, case-insensitive ---
Prodotto.searchByNome=SELECT p FROM Prodotto p \
  WHERE p.attivo = TRUE AND LOWER(p.nome) LIKE LOWER(CONCAT('%', :testo, '%'))
  
# --- Prodotto: ricerca ADMIN, include i disattivati (magazzino) ---
Prodotto.searchByNomeAdmin=SELECT p FROM Prodotto p \
  WHERE LOWER(p.nome) LIKE LOWER(CONCAT('%', :testo, '%'))

# --- Carta: ricerca per nome, case-insensitive ---
Carta.searchByNome=SELECT c FROM Carta c \
  WHERE LOWER(c.nome) LIKE LOWER(CONCAT('%', :testo, '%'))


# --- Stampa: tutte le versioni di una carta con espansione (anti-N+1) ---
Stampa.findByCartaIdWithEspansione=SELECT s FROM Stampa s \
  JOIN FETCH s.espansione e \
  WHERE s.carta.id = :cartaId \
  ORDER BY e.dataUscita DESC

# --- VoceCarrello: voci del carrello con SKU e prodotto (anti-N+1) ---
VoceCarrello.findByCarrelloIdWithSku=SELECT v FROM VoceCarrello v \
  JOIN FETCH v.sku s \
  JOIN FETCH s.prodotto p \
  WHERE v.carrello.id = :carrelloId \
  ORDER BY v.id

# --- VoceOrdine: voci di un ordine con SKU e prodotto (per reso/ripristino) ---
VoceOrdine.findByOrdineIdWithSku=SELECT v FROM VoceOrdine v \
  JOIN FETCH v.sku s \
  JOIN FETCH s.prodotto p \
  WHERE v.ordine.id = :ordineId \
  ORDER BY v.id

# --- Recensione: media e conteggio per prodotto (pagina prodotto) ---
Recensione.statisticheByProdotto=SELECT new com.betacom.mtgbazar.be.dto.users.RecensioneStatisticheDTO(AVG(r.voto), COUNT(r)) \
  FROM Recensione r \
  WHERE r.prodotto.id = :prodottoId AND r.stato = :stato

# --- RefreshToken: reuse detection e logout — brucia la CATENA di rotazione ---
RefreshToken.revocaFamiglia=UPDATE RefreshToken r SET r.revocato = TRUE \
  WHERE r.famiglia = :famiglia AND r.revocato = FALSE

# --- RefreshToken: "disconnetti tutti i dispositivi" — cambio password ---
RefreshToken.revocaTutteByUtenteId=UPDATE RefreshToken r SET r.revocato = TRUE \
  WHERE r.utente.id = :utenteId AND r.revocato = FALSE

# --- RefreshToken: pulizia periodica — cancella gli scaduti oltre il margine ---
RefreshToken.deleteScadutiPrimaDi=DELETE FROM RefreshToken r \
  WHERE r.scadenza < :soglia