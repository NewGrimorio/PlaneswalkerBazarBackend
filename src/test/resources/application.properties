spring.application.name=PlaneswalkerBazarBackend

logging.level.root=info
logging.level.com.betacom=debug
logging.pattern.console=  %d{"yyyy/MM/dd HH:mm:ss,SSS"} [%p] [%t] %M\\(%F:%L\\) - %msg%n
logging.file.name=./jpaMtg-test.log

# --- Profilo dei test: security disattivata come in dev ---
# I test di service e MockMvc esercitano business logic e web layer,
# non l'autenticazione: girano sulla filter chain permitAll. I test
# dedicati alla sicurezza (Fase B) attiveranno "prod" esplicitamente.
spring.profiles.active=dev

# --- H2 in-memory in modalita' PostgreSQL ---
spring.datasource.url=jdbc:h2:mem:dbJpaBazar;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# --- Stessa disciplina della produzione: Flyway crea (V1+V2), Hibernate valida ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

lang=IT
app.upload.dir=./target/test-uploads

# --- JWT per i test (Fase B) ---
# Secret FINTO e fisso: committabile perche' non protegge nulla,
# esiste solo per far partire il contesto con i bean JWT sull'H2 dei
# test. La regola non e' "mai secret nei file": e' "mai secret di
# ambienti REALI nei file".
app.jwt.secret=zNac5CBxOPE2BfzeIkDablDSQI6IOmz4abDECbVaeRNJe/854q7jvbhSUxi6GPrHplg57OpCOYgi/JpqABXoBA==
app.jwt.access-token-expiration-seconds=900
app.jwt.refresh-token-expiration-days=7
app.jwt.cookie-secure=false

# --- Pulizia refresh token: job DISATTIVATO nei test ---
# Un cron che non scatta mai: la suite non deve dipendere da un timer,
# e i test che riguardano la pulizia chiamano pulisci() direttamente.
app.jwt.cleanup-grace-days=7
app.jwt.cleanup-cron=-