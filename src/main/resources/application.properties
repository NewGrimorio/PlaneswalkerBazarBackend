spring.application.name=PlaneswalkerBazarBackend

# --- Logging ---
logging.level.root=info
logging.level.com.betacom=debug
logging.pattern.console=  %d{"yyyy/MM/dd HH:mm:ss,SSS"} [%p] [%t] %M\\(%F:%L\\) - %msg%n
logging.file.name=./planeswalkerBazar.log

# --- Server ---
server.port=9090

# --- Profili di sicurezza ---
# dev  = security disattivata (lavoro quotidiano)
# prod = security attiva (regole in SecurityConfig)
# In produzione NON si tocca questo file: la variabile d'ambiente
# SPRING_PROFILES_ACTIVE=prod ha precedenza e sovrascrive il valore.
spring.profiles.active=dev

# --- Datasource (PostgreSQL) ---
spring.datasource.url=${db_url}
spring.datasource.username=${db_user}
spring.datasource.password=${db_pwd}

# --- JPA: Flyway possiede lo schema, Hibernate lo verifica soltanto ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- DevTools ---
spring.devtools.restart.exclude=db/migration/**

lang=IT
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

# --- JWT (Fase B) ---
# Il secret vive SOLO nella variabile d'ambiente jwt_secret (Run
# Configuration in dev, secret manager in prod): mai in chiaro qui,
# questo file finisce su GitHub. Generazione: openssl rand -base64 64
app.jwt.secret=${jwt_secret}
app.jwt.access-token-expiration-seconds=900
app.jwt.refresh-token-expiration-days=7
app.jwt.cookie-secure=false
