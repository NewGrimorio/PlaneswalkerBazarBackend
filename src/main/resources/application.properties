spring.application.name=PlaneswalkerBazarBackend

# --- Logging ---
logging.level.root=info
logging.level.com.betacom=debug
logging.pattern.console=  %d{"yyyy/MM/dd HH:mm:ss,SSS"} [%p] [%t] %M\\(%F:%L\\) - %msg%n
logging.file.name=./planeswalkerBazar.log

# --- Server ---
server.port=9090

# --- Datasource (PostgreSQL) ---
spring.datasource.url=${db_url}
spring.datasource.username=${db_user}
spring.datasource.password=${db_pwd}

# --- JPA: Flyway possiede lo schema, Hibernate lo verifica soltanto ---
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- DevTools ---
spring.devtools.restart.exclude=db/migration/**

lang=IT
app.upload.dir=./uploads
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB

